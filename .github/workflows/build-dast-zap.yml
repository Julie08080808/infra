name: 04 Build and DAST - OWASP ZAP

on:
  workflow_dispatch:

env:
  LOCAL_IMAGE_NAME: youtube-music-bot:build-dast-test

jobs:
  # ============================================================
  # Job 1：Build
  #
  # 目的：
  # - 安裝專案相依套件
  # - Build 前後端應用程式
  # - 建立 Docker image
  # - 將 Docker image 存成 artifact，提供給 DAST job 使用
  #
  # 注意：
  # - 不 push 到 Docker Hub
  # - image 只在 CI 內部測試使用
  # ============================================================
  build:
    name: Build - App and Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        run: |
          if [ -d "frontend" ]; then
            (cd frontend && (npm ci || npm install))
          fi

      - name: Build application
        run: npm run build:all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.LOCAL_IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image to tar
        run: |
          docker save -o docker-image.tar ${{ env.LOCAL_IMAGE_NAME }}

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image.tar
          retention-days: 1

      - name: Show Build result in GitHub Summary
        if: always()
        run: |
          echo "## Build Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Build Steps" >> "$GITHUB_STEP_SUMMARY"
          echo "- Install root dependencies with Bun" >> "$GITHUB_STEP_SUMMARY"
          echo "- Install frontend dependencies with npm" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run \`npm run build:all\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build Docker image locally" >> "$GITHUB_STEP_SUMMARY"
          echo "- Save Docker image as artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Docker Image" >> "$GITHUB_STEP_SUMMARY"
          echo "- Local image: \`${{ env.LOCAL_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Push to Docker Hub: **false**" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # Job 2：DAST
  #
  # 目的：
  # - 下載 Build job 產生的 Docker image
  # - 啟動應用程式 container
  # - 使用 OWASP ZAP 掃描 http://localhost:3000
  #
  # 這裡的 DAST 不是自己重新 build，
  # 而是承接 build job 的 Docker image。
  # ============================================================
  dast:
    name: DAST - OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      issues: write

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: docker-image

      - name: Load Docker image
        run: |
          docker load -i docker-image.tar

      - name: Start application container
        run: |
          docker run -d \
            --name youtube-music-bot-dast \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e LOG_LEVEL=INFO \
            -e YTDLP_EXTRACTOR_ARGS="youtube:player_client=android_vr" \
            ${{ env.LOCAL_IMAGE_NAME }}

      - name: Wait for application
        run: |
          echo "Waiting for http://localhost:3000 ..."

          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            echo "Attempt $i: HTTP $STATUS"

            if echo "$STATUS" | grep -qE "^[2-4]"; then
              echo "Application is running."
              exit 0
            fi

            sleep 3
          done

          echo "Application did not start in time."
          echo "===== Container logs ====="
          docker logs youtube-music-bot-dast || true
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          fail_action: false
          allow_issue_writing: false
          cmd_options: "-a -I"

      - name: Save application logs
        if: always()
        run: |
          docker logs youtube-music-bot-dast > app.log 2>&1 || true

      - name: Show DAST result in GitHub Summary
        if: always()
        run: |
          echo "## DAST - OWASP ZAP Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Workflow relation" >> "$GITHUB_STEP_SUMMARY"
          echo "- DAST depends on Build by using \`needs: build\`." >> "$GITHUB_STEP_SUMMARY"
          echo "- DAST uses the Docker image generated by the Build job." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Target" >> "$GITHUB_STEP_SUMMARY"
          echo "- http://localhost:3000" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Generated files" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`report_html.html\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`report_md.md\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`report_json.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`app.log\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f report_md.md ]; then
            echo "### ZAP Markdown Report Preview" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            head -n 100 report_md.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ZAP markdown report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload DAST reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-dast-zap-reports
          path: |
            app.log
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: warn

      - name: Clean up container
        if: always()
        run: |
          docker rm -f youtube-music-bot-dast || true
