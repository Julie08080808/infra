name: CD Staging

on:
  workflow_run:
    workflows:
      - Main Build
    types:
      - completed
    branches:
      - main

concurrency:
  group: cd-staging-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  REGISTRY: harbor.jlsa.local:30443
  IMAGE_NAME: ci/youtube-music-bot
  APP_NAME: youtube-music-bot
  APP_PORT: "3000"
  STAGING_NAMESPACE: staging-youtube-music-bot
  STAGING_NODE_PORT: "31081"

jobs:
  deploy-staging:
    name: Deploy to VM3 Staging
    runs-on: arc-runner-set
    timeout-minutes: 20
    environment: staging

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Install kubectl
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/bin"

          KUBECTL_VERSION="v1.30.14"

          echo "Installing kubectl ${KUBECTL_VERSION}"

          curl -L --fail --retry 3 \
            -o "$RUNNER_TEMP/bin/kubectl" \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"

          chmod +x "$RUNNER_TEMP/bin/kubectl"

          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

          "$RUNNER_TEMP/bin/kubectl" version --client

      - name: Configure Kubernetes Auth
        env:
          K8S_KUBECONFIG_B64: ${{ secrets.K8S_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${K8S_KUBECONFIG_B64:-}" ]; then
            echo "K8S_KUBECONFIG_B64 is empty."
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/kube"

          printf "%s" "$K8S_KUBECONFIG_B64" \
            | base64 -d > "$RUNNER_TEMP/kube/config"

          chmod 600 "$RUNNER_TEMP/kube/config"

          echo "KUBECONFIG=$RUNNER_TEMP/kube/config" >> "$GITHUB_ENV"
          export KUBECONFIG="$RUNNER_TEMP/kube/config"

          echo "Testing Kubernetes API access..."
          kubectl get --raw=/version

          echo "Current context:"
          kubectl config current-context

      - name: Check VM3 Node Label
        run: |
          set -euo pipefail

          echo "Checking node3 labels..."
          kubectl get node node3 --show-labels

          NODE3_DEDICATED="$(kubectl get node node3 -o jsonpath='{.metadata.labels.dedicated}')"

          if [ "${NODE3_DEDICATED}" != "production-storage" ]; then
            echo "node3 does not have label dedicated=production-storage"
            exit 1
          fi

          echo "node3 label OK: dedicated=production-storage"

      - name: Download Main Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: main-build-artifacts
          path: main-build-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve Image Digest
        run: |
          set -euo pipefail

          echo "Downloaded artifacts:"
          find main-build-artifacts -maxdepth 2 -type f -print

          IMAGE_METADATA="main-build-artifacts/image-metadata.txt"

          if [ ! -f "${IMAGE_METADATA}" ]; then
            echo "image-metadata.txt not found."
            exit 1
          fi

          echo "Image metadata:"
          cat "${IMAGE_METADATA}"

          IMAGE_DIGEST="$(grep -E '^IMAGE_DIGEST=' "${IMAGE_METADATA}" | tail -1 | sed 's/^IMAGE_DIGEST=//')"

          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "IMAGE_DIGEST not found in image-metadata.txt."
            exit 1
          fi

          echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> "$GITHUB_ENV"

          echo "Resolved staging image:"
          echo "${IMAGE_DIGEST}"

      - name: Check NodePort Availability
        run: |
          set -euo pipefail

          echo "Checking whether NodePort ${STAGING_NODE_PORT} is already used..."

          if kubectl get svc -A -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{" "}{range .spec.ports[*]}{.nodePort}{" "}{end}{"\n"}{end}' \
            | grep -w "${STAGING_NODE_PORT}"; then
            echo "NodePort ${STAGING_NODE_PORT} is already used."
            exit 1
          fi

          echo "NodePort ${STAGING_NODE_PORT} is available."

      - name: Deploy Staging to VM3
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${HARBOR_USERNAME:-}" ] || [ -z "${HARBOR_PASSWORD:-}" ]; then
            echo "HARBOR_USERNAME or HARBOR_PASSWORD is empty."
            exit 1
          fi

          echo "Deploying image to VM3 staging:"
          echo "${IMAGE_DIGEST}"

          kubectl create namespace "${STAGING_NAMESPACE}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret docker-registry harbor-registry-secret \
            -n "${STAGING_NAMESPACE}" \
            --docker-server="${REGISTRY}" \
            --docker-username="${HARBOR_USERNAME}" \
            --docker-password="${HARBOR_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -

          cat << EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: ${STAGING_NAMESPACE}
            labels:
              app: ${APP_NAME}
              environment: staging
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
                  environment: staging
                annotations:
                  jlsa.dev/image-digest: "${IMAGE_DIGEST}"
              spec:
                nodeSelector:
                  dedicated: production-storage
                imagePullSecrets:
                  - name: harbor-registry-secret
                containers:
                  - name: app
                    image: ${IMAGE_DIGEST}
                    ports:
                      - containerPort: ${APP_PORT}
                    readinessProbe:
                      httpGet:
                        path: /
                        port: ${APP_PORT}
                      initialDelaySeconds: 5
                      periodSeconds: 10
                      failureThreshold: 6
                    livenessProbe:
                      httpGet:
                        path: /
                        port: ${APP_PORT}
                      initialDelaySeconds: 20
                      periodSeconds: 20
                      failureThreshold: 3
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            namespace: ${STAGING_NAMESPACE}
            labels:
              app: ${APP_NAME}
              environment: staging
          spec:
            type: NodePort
            selector:
              app: ${APP_NAME}
            ports:
              - name: http
                port: ${APP_PORT}
                targetPort: ${APP_PORT}
                nodePort: ${STAGING_NODE_PORT}
          EOF

          kubectl rollout status deployment/${APP_NAME} \
            -n "${STAGING_NAMESPACE}" \
            --timeout=180s

          echo "Staging resources:"
          kubectl get pods -n "${STAGING_NAMESPACE}" -o wide
          kubectl get svc -n "${STAGING_NAMESPACE}"

      - name: Verify Staging Pod Runs on VM3
        run: |
          set -euo pipefail

          POD_NODE="$(kubectl get pod -n "${STAGING_NAMESPACE}" \
            -l app="${APP_NAME}" \
            -o jsonpath='{.items[0].spec.nodeName}')"

          echo "Staging pod node: ${POD_NODE}"

          if [ "${POD_NODE}" != "node3" ]; then
            echo "Staging pod is not running on node3."
            exit 1
          fi

          echo "Staging pod is running on VM3/node3."

      - name: Smoke Test Staging
        run: |
          set -euo pipefail

          STAGING_CLUSTER_URL="http://${APP_NAME}.${STAGING_NAMESPACE}.svc.cluster.local:${APP_PORT}"

          echo "Testing staging service inside cluster:"
          echo "${STAGING_CLUSTER_URL}"

          for i in $(seq 1 30); do
            if curl -fsS "${STAGING_CLUSTER_URL}" > /tmp/staging-response.html; then
              echo "Staging cluster smoke test passed."
              head -20 /tmp/staging-response.html || true
              exit 0
            fi

            echo "Waiting for staging service... ${i}"
            sleep 5
          done

          echo "Staging smoke test failed."
          kubectl get pods -n "${STAGING_NAMESPACE}" -o wide
          kubectl describe deployment "${APP_NAME}" -n "${STAGING_NAMESPACE}"
          exit 1

      - name: Write Staging Summary
        if: always()
        run: |
          echo "## CD Staging Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`${STAGING_NAMESPACE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | \`${APP_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Digest | \`${IMAGE_DIGEST:-not-resolved}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node Selector | \`dedicated=production-storage\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expected Node | \`node3\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster URL | \`http://${APP_NAME}.${STAGING_NAMESPACE}.svc.cluster.local:${APP_PORT}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NodePort | \`${STAGING_NODE_PORT}\` |" >> "$GITHUB_STEP_SUMMARY"
